customHeaders:
  - pattern: "**/*"
    headers:
      - key: "Strict-Transport-Security"
        value: "max-age=63072000; includeSubDomains; preload"
      - key: "X-Frame-Options"
        value: "DENY"
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
      - key: "Permissions-Policy"
        value: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
      - key: "Cross-Origin-Opener-Policy"
        value: "same-origin"
      - key: "Cross-Origin-Resource-Policy"
        value: "same-origin"
      - key: "Content-Security-Policy"
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.googletagmanager.com https://js.hsforms.net https://*.hsforms.com https://*.hsforms.net https://*.hubspot.com https://*.hs-scripts.com https://*.hs-analytics.net; style-src 'self' 'unsafe-inline' https://*.hsforms.com https://*.hsforms.net; img-src 'self' data: blob: https://www.googletagmanager.com https://*.google-analytics.com https://*.googletagmanager.com https://*.hsforms.com https://*.hsforms.net https://*.hubspot.com; font-src 'self' data: https://*.hsforms.com https://*.hsforms.net; media-src 'self'; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://stats.g.doubleclick.net https://*.retool.com https://forms.hsforms.com https://*.hsforms.com https://*.hsforms.net https://*.hubspot.com https://*.hs-scripts.com https://*.hs-analytics.net; frame-src https://*.retool.com https://*.hsforms.com https://*.hsforms.net https://*.hubspot.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://forms.hsforms.com https://*.hsforms.com; object-src 'none'; manifest-src 'self'; upgrade-insecure-requests"

  - pattern: "**/*.html"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=0, must-revalidate"

  - pattern: "/assets/**"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"

  - pattern: "/wasm/**"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"

  # AEO (Answer Engine Optimization) surfaces — agent-readable Markdown.
  - pattern: "**/*.md"
    headers:
      - key: "Content-Type"
        value: "text/markdown; charset=utf-8"
      - key: "Cache-Control"
        value: "public, max-age=300, must-revalidate"

  - pattern: "/llms.txt"
    headers:
      - key: "Content-Type"
        value: "text/plain; charset=utf-8"
      - key: "Cache-Control"
        value: "public, max-age=300, must-revalidate"

  - pattern: "/llms-full.txt"
    headers:
      - key: "Content-Type"
        value: "text/plain; charset=utf-8"
      - key: "Cache-Control"
        value: "public, max-age=300, must-revalidate"
