# Phase 1a/1c/1d discovery output for Heartland Industries
brand:
  name: "Heartland Industries"
  short_name: "Heartland"
  domain: "heartland.io"
  tagline: "The future of material innovation"
  pitch: "Heartland is a material science company helping manufacturers exceed their cost-reduction goals while reducing their emissions."
  primary_color: "#ad2929"     # exact match to HFGA template default — no token sweep needed
  accent_color:  "#ad5353"     # secondary tint visible on heartland.io
  body_font: "Inter"           # source uses Roboto+Poppins; swap to Inter per replicate.md §5i font portability
  display_font: "Inter"
  source_fonts_noted: ["Roboto:500,400", "Poppins:600"]   # for the record only
  logo_color_url:  "https://heartland.io/wp-content/uploads/2022/08/Heartland-MAIN-LOGO.png"
  logo_white_url:  "https://heartland.io/wp-content/uploads/2022/08/Heartland-White-Logo.png"
  favicon_url:     "https://heartland.io/wp-content/uploads/2025/04/cropped-Heartland-White-Logo-favicon-e1745249729589-192x192.png"
  social:
    facebook:  https://www.facebook.com/therealheartland/
    twitter:   https://twitter.com/HeartlandXL
    linkedin:  https://linkedin.com/company/therealheartland
    instagram: https://www.instagram.com/heartlandmaterials
    youtube:   https://www.youtube.com/channel/UCw3n3hnQX8PqgG-QIDb4BjA
  contact_email: "Hello@heartland.io"

trackers:
  keep:
    ga4: "G-CFVBK0N6L6"        # reused from existing heartland.io property (per playbook)
  drop:
    - HubSpot (_hsq)            # Heartland was a HubSpot CMS-adjacent site; drop the runtime
    - Hotjar (hjid:2032509)     # session replay — out of scope by default
    - Klaviyo                   # not present on source — delete popup.rs component
    - Elementor + Revslider JS  # WP plugin runtime, irrelevant after migration

primary_menu:
  why_imperium:    /why-imperium
  products:
    - { label: "Imperium Masterbatch",      path: /imperium-masterbatch }
    - { label: "Performance Plastics",      path: /imperium-filled-resin }
    - { label: "Pallets & Bins",            path: /carbon-neutral-packaging-with-imperium-inside }
    - { label: "Shop Samples",              path: /shop }
  industries:
    - { label: "Plastic Compounding",       path: /sustainable-plastic-compounding }
    - { label: "Automotive",                path: /automotive }
    - { label: "Packaging",                 path: /sustainable-packaging }
    - { label: "Construction",              path: /sustainable-building-materials }
    - { label: "Animal Feed",               path: /imperium-animal-feed }
  materials:
    - { label: "Plastic",   path: /sustainable-plastic-compounding }
    - { label: "Rubber",    path: /sustainable-rubber-additives }
    - { label: "Textiles",  path: /imperium-fibers }
    - { label: "Concrete",  path: /sustainable-concrete-additives }
    - { label: "Asphalt",   path: /sustainable-asphalt-additives }
    - { label: "Paper",     path: /sustainable-paper-additives }
  resources:
    - { label: "Imperium Graphene",   path: /imperium-graphene }
    - { label: "Engineering Earth",   path: /engineering-earth }
    - { label: "Carbon Report",       path: "https://www.carbon-report.com",  external: true }
    - { label: "E-Books",             path: /e-books }
    - { label: "HFGA",                path: "https://hfga.io",                external: true }
    - { label: "FAQ",                 path: /frequently-asked-questions }
    - { label: "Research",            path: /natural-fiber-research }
    - { label: "White Papers",        path: /whitepapers }
  about:
    - { label: "Team",                          path: /heartland-team }
    - { label: "Our Farmers",                   path: /heartland-farmers }
    - { label: "Green Packaging Initiative",    path: /green-packaging-initiative }
