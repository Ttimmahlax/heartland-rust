  contact: /contact

skipped_routes:
  - /portfolios/                       # custom post type — duplicates inner pages
  - /page-piling/                      # WP-themed sample/landing leftover
  - /heartland-blog/                   # dupes /sustainability-news
  - /heartland-e-books/                # dupes /e-books
  - /hemp-fiber-and-hurd/              # supersceded by /imperium-filler
  - /wood-products/                    # legacy product line page, retired
  - /engage/                           # WP form-only landing
  - /z-landing-page-*/                 # 5x z-prefixed landing-page variants (Yoast leftovers)
  - /case-studies/                     # empty / no body
  - /plastic-additives/                # dupes /sustainable-plastic-compounding
  - /usda/                             # award announcement, content folded into an article
  - /imperium-pork-feed/               # 3x species-specific feed dupes → covered by /imperium-animal-feed
  - /imperium-cattle-feed/
  - /imperium-chicken-feed/
  - /carbon-neutral-packaging-with-imperium-inside/  # alias for /sustainable-packaging
  - /imperium-spin-ready-white-fiber/  # narrow product variant — covered by /imperium-fibers
  - /imperium-yarn/
  - /imperium-fabric/
  - /imperium-graphene/                # planned product page — skip until product launches
  - /shop                              # external e-commerce — keep as external link, no internal route
  - /sustainable-foam/                 # category leftover, no body
  - /sustainable-building-materials/   # covered as "Construction" — keep this; remove only the dupe
  - /digeco_team*                      # WP custom post type — replaced by /heartland-team static page
  - /digeco_portfolio*                 # WP custom post type — out of scope (collateral imagery only)
  - /sustainability-news/team/*        # 8 team profile pages, folded into a single /heartland-team
  - /sustainability-news/portfolio/*   # 23 portfolio item pages, out of scope
  - /sustainability-news/category/*    # WP archive
  - /sustainability-news/tag/*         # WP archive

# Articles to migrate: every URL under /sustainability-news/<slug>/ from post-sitemap.xml
# Slugs match verbatim, including the "sustainability-news" prefix — we'll route as /sustainability-news/<slug>

cms_source: "WordPress + Elementor + DigEco theme"
migration_date: "2026-05-14"
